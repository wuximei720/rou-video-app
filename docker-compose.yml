version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: rou-video-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rou_video_db
      POSTGRES_USER: rou_video_user
      POSTGRES_PASSWORD: rou_video_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rou_video_user -d rou_video_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rou-video-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rou_video_user:rou_video_password@db:5432/rou_video_db
      DATABASE_PROVIDER: postgresql
      ARK_API_KEY: ${ARK_API_KEY}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      DOUBAO_MODEL_ID: ${DOUBAO_MODEL_ID:-doubao-seed-2-0-lite-260428}
      SEEDANCE_MODEL_ID: ${SEEDANCE_MODEL_ID:-doubao-seedance-2-0}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/temp:/app/public/temp
    restart: unless-stopped

volumes:
  postgres_data:
